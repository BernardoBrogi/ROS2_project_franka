sensors:
  - depth_camera

depth_camera:
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
  point_cloud_topic: /fr3/depth_camera/points
  max_range: 1.2
  point_subsample: 3
  max_update_rate: 3.0
  padding_offset: 0.0
  padding_scale: 1.0
  filtered_cloud_topic: filtered_cloud
  ns: depth_camera